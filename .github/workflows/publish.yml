name: Build and Publish to crates.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    name: Test (correctness)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install dependencies
        run: cargo fetch

      - name: Run correctness tests
        env:
          CI: "1"
        # Debug build: this is a correctness gate, not a perf gate. The release
        # profile (lto="fat", codegen-units=1) makes a full --release test build
        # take 50+ min on shared runners. Debug verifies the same correctness.
        run: |
          cargo test --workspace --all-features -- \
            --test-threads=1 \
            --skip bench_ --skip stress_ --skip perf_ \
            --skip test_memory_linear \
            --skip test_memory_leak \
            --skip test_memory_does_not_grow_unbounded \
            --skip test_disk_usage \
            --skip test_no_bloat \
            --skip test_perf_ \
            --skip test_scan_latency_bounded \
            --skip test_insert_latency_bounded \
            --skip test_aggregate_latency_bounded \
            --skip test_distinct_latency_bounded \
            --skip test_where_latency_bounded \
            --skip test_pk_select_latency_stable \
            --skip test_latency_growth_sublinear \
            --skip test_scalability_latency \
            --skip test_scalability_memory \
            --skip test_durability_large_dataset_checkpoint_recovery \
            --skip test_performance_guarantees

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install dependencies
        run: cargo fetch

      - name: Build (release)
        run: cargo build --release

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Tag: $TAG"
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed -E 's/version\s*=\s*"(.*)"/\1/')
          echo "Version from Cargo.toml: $VERSION"
          if [ "v$VERSION" != "$TAG" ]; then
            echo "Tag does not match version in Cargo.toml (v$VERSION expected). Aborting.";
            exit 1;
          fi

      - name: Package check
        # No --allow-dirty: the package must be clean so we never publish
        # uncommitted changes or stray working files to crates.io.
        run: cargo package

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_TOKEN is not set in repository secrets. Aborting."; exit 1;
          fi
          cargo publish
